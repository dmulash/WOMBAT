capacity_kw: 3300
capex_kw: 1091
power_curve:
  file: ATB3_3_SAM.csv
  bin_width: 0.25
main_bearing_maintenance:
  name: main_bearing_maintenance
  maintenance:
  - description: minor scheduled repair
    time: 6 # half a workday (each shift is 12h)
    materials: 2500 # (for oil change), no labor
    service_equipment: CTV
    frequency: 6 # 6 years
    frequency_basis: date-years
    start_date: 01/15/2023
  - description: major scheduled repair
    time: 12 # 1 workday
    materials: 46500
    service_equipment: CTV
    frequency: 15 # 15 years
    frequency_basis: date-years
    start_date: 01/15/2032
  failures:
  - scale: 0
    shape: 0
    time: 0
    materials: 0
    service_equipment: CTV
    operation_reduction: 0.0
    level: 1
    description: n/a
main_bearing_failures:
  name: main_bearing_failures
  maintenance:
  - description: n/a
    time: 0
    materials: 0
    service_equipment: RMT
    frequency: 0
  failures:
  - scale: 93.423 # slide 5, EPRI WinNER Replacement Rates
    shape: 1.151 # slide 5, EPRI WinNER Replacement Rates
    time: 12 # 1 workday
    materials: 46500
    service_equipment: CTV
    operation_reduction: 1.00  # assumed curtailed 2%
    level: 6
    description: major repair
  - scale: 2913.198 # spontaneus unscheduled, 1% in plant lifetime, beta = 1
    shape: 1 # spontaneus unscheduled, 1% in plant lifetime, beta = 1
    time: 84 # 1 week downtime for swap (7 workdays = 7 x 12h = 84h)
    materials: 230000   
    #materials: 656410  # number includes labor, crane costs, parts (900k minus 185k for crane mob - 3.78k day rate x (84h for repair + 288h [based on avearge weather, waiting for next work shift, and other delays] for delays) / 24h = 688.54k)
    service_equipment: LCN_1mo_miba # (use crane with 1 mo mobilization, and 0 cost)
    operation_reduction: 1.00 # assumed curtailed 100% because of the failure
    level: 6
    description: major replacement
    replacement: true
